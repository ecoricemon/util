# ref: https://github.com/gpakosz/.tmux/blob/master/.tmux.conf

# Use tmux's own 256-color terminfo inside panes.
set -g default-terminal "tmux-256color"

# Tell tmux that Alacritty supports direct RGB color.
set -as terminal-features ",alacritty:rgb"

# Recognize modified keys such as Ctrl-arrow in xterm-compatible terminals.
setw -g xterm-keys on

# Make Escape/Alt-key sequences responsive without making vim mode too twitchy.
set -s escape-time 10

# Keep repeatable prefix bindings active briefly after the first keypress.
set -sg repeat-time 600

# Notify applications inside tmux when terminal focus enters or leaves a pane.
set -s focus-events on

# Add C-a as a secondary prefix while keeping the default C-b prefix.
set -g prefix2 C-a

# Pressing C-a twice sends a literal C-a to the foreground program.
bind C-a send-prefix -2

# Keep 10,000 lines of scrollback per pane.
set -g history-limit 10000

# Reload this config with prefix + r.
bind r source-file ~/.tmux.conf \; display-message "~/.tmux.conf sourced"

# Start window numbering at 1 instead of 0.
set -g base-index 1

# Start pane numbering at 1 instead of 0.
setw -g pane-base-index 1

# Rename windows automatically based on the active command.
setw -g automatic-rename on

# Close gaps in window numbers after a window is closed.
set -g renumber-windows on

# Let tmux update the terminal title.
set -g set-titles on

# Show pane numbers for 800 ms after display-panes is triggered.
set -g display-panes-time 800

# Show tmux messages for 1 second.
set -g display-time 1000

# Refresh the status line every 10 seconds.
set -g status-interval 10

# Clear both the screen and tmux scrollback with Ctrl-l.
bind -n C-l send-keys C-l \; run 'sleep 0.2' \; clear-history

# Mark windows when activity occurs in an inactive pane.
set -g monitor-activity on

# Do not show a visual notification for monitored activity.
set -g visual-activity off

# Use Homebrew fish for new panes and windows.
set-option -g default-shell /opt/homebrew/bin/fish

# Split vertically in the current pane's working directory.
bind '"' split-window -v -c "#{pane_current_path}"

# Split horizontally in the current pane's working directory.
bind % split-window -h -c "#{pane_current_path}"

# Enable mouse selection, resizing, and pane/window switching.
set -g mouse on

# Use vi-style keys in copy mode.
setw -g mode-keys vi
